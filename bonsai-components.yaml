# Build phase configuration for Bonsai packages

# Libraries: External packages that can be built in parallel
libraries:
  - "@bonsai/rxjs"
  - "@bonsai/immer"
  - "@bonsai/valibot"
  # @bonsai/remeda supprimé (ADR-0031 C3 — hors API publique Bonsai)

# Packages: Our in-house packages with possible interdependencies
# Order = topological (dependencies first)
packages:
  - "@bonsai/types"
  - "@bonsai/event"
  - "@bonsai/error"
  - "@bonsai/entity"
  - "@bonsai/feature"
  - "@bonsai/view"
  - "@bonsai/composer"
  - "@bonsai/foundation"
  - "@bonsai/application"
