# ═══════════════════════════════════════════════════════════════════════════
# Gate de non-régression cumulative — ADR-0034
# ═══════════════════════════════════════════════════════════════════════════
#
# Exécute tous les fichiers *.regression.test.ts (toutes strates, tous
# niveaux : unit, integration, e2e). Doit rester vert pour merger.
#
# Voir : docs/adr/ADR-0034-cumulative-regression-gate.md

name: "🛡️ Regression Gate"

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main

concurrency:
  group: regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    name: "Non-regression tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run regression gate
        run: pnpm test:regression
