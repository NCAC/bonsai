# ═══════════════════════════════════════════════════════════════════════════
# Vérification continue — ADR-0034
# ═══════════════════════════════════════════════════════════════════════════
#
# Type-check + suite de tests complète.
# Doit rester vert pour merger une PR vers develop.
#
# Voir : docs/adr/ADR-0034-continuous-verification-strategy.md

name: "🛡️ Continuous Verification"

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: "Type-check + Full test suite"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm tsc --noEmit

      - name: Full test suite
        run: pnpm test:ci
